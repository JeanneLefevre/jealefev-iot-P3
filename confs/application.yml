apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  source:
    repoURL: https://github.com/JeanneLefevre/my-app
    targetRevision: HEAD
    path: confs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
